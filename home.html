<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Routly — Navigate Smarter</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --ink: #0d0d12;
        --paper: #f5f4ef;
        --accent: #e85d26;
        --accent-light: #ff8a5c;
        --muted: #9b9b8a;
        --card-bg: #ffffff;
        --grid: rgba(13, 13, 18, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background-color: var(--paper);
        color: var(--ink);
        overflow-x: hidden;
      }

      h1,
      h2,
      h3,
      h4,
      .brand {
        font-family: "Syne", sans-serif;
      }

      /* ─── NAVBAR ─────────────────────────────────── */
      .nav1 {
        background: var(--paper) !important;
        border-bottom: 1.5px solid rgba(13, 13, 18, 0.1);
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
      }

      .nav1 .btn-ghost.text-xl {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 1.3rem;
        letter-spacing: -0.03em;
        color: var(--ink);
      }

      .nav1 .btn-ghost.text-xl::before {
        content: "";
        display: inline-block;
        width: 10px;
        height: 10px;
        background: var(--accent);
        border-radius: 50%;
        margin-right: 8px;
        vertical-align: middle;
      }

      .nav1 .menu a {
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--ink);
        opacity: 0.75;
        transition: opacity 0.2s;
      }

      .nav1 .menu a:hover {
        opacity: 1;
      }

      .nav1 .navbar-end .btn {
        background: var(--ink);
        color: var(--paper);
        border: none;
        font-family: "Syne", sans-serif;
        font-weight: 600;
        font-size: 0.85rem;
        letter-spacing: 0.02em;
        border-radius: 100px;
        padding: 0 1.5rem;
        transition:
          background 0.2s,
          transform 0.15s;
      }

      .nav1 .navbar-end .btn:hover {
        background: var(--accent);
        transform: translateY(-1px);
      }

      /* ─── HERO ───────────────────────────────────── */
      .hero-section {
        min-height: 92vh;
        display: grid;
        grid-template-columns: 1fr 1fr;
        align-items: center;
        gap: 4rem;
        padding: 6rem 8vw 4rem;
        position: relative;
        overflow: hidden;
      }

      /* dot-grid background */
      .hero-section::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: radial-gradient(
          circle,
          var(--grid) 1.5px,
          transparent 1.5px
        );
        background-size: 28px 28px;
        z-index: 0;
        pointer-events: none;
      }

      /* diagonal accent stripe */

      .section-sub {
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
        max-width: 500px;
        margin-bottom: 3.5rem;
      }

      .features-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
      }

      .feature-card {
        background: var(--card-bg);
        border-radius: 20px;
        padding: 2rem;
        border: 1.5px solid rgba(13, 13, 18, 0.07);
        transition:
          transform 0.25s,
          box-shadow 0.25s,
          border-color 0.25s;
        position: relative;
        overflow: hidden;
      }

      .feature-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--accent);
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.3s ease;
      }

      .feature-card:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 48px rgba(13, 13, 18, 0.1);
        border-color: rgba(232, 93, 38, 0.2);
      }

      .feature-card:hover::before {
        transform: scaleX(1);
      }

      .feature-icon {
        width: 52px;
        height: 52px;
        background: rgba(232, 93, 38, 0.08);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        margin-bottom: 1.25rem;
        transition: background 0.2s;
      }

      .feature-card:hover .feature-icon {
        background: rgba(232, 93, 38, 0.15);
      }

      .feature-card h3 {
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 0.6rem;
        letter-spacing: -0.02em;
      }

      .feature-card p {
        font-size: 0.88rem;
        color: var(--muted);
        line-height: 1.65;
      }

      /* ─── HOW IT WORKS ───────────────────────────── */
      .how-section {
        padding: 7rem 8vw;
        background: var(--ink);
        color: var(--paper);
        position: relative;
        overflow: hidden;
      }

      .how-section::before {
        content: "";
        position: absolute;
        top: -200px;
        right: -200px;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          ellipse,
          rgba(232, 93, 38, 0.08) 0%,
          transparent 70%
        );
        pointer-events: none;
      }

      .how-section .section-heading {
        color: var(--paper);
      }

      .steps-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2rem;
        position: relative;
      }

      /* connector line between steps */
      .steps-grid::before {
        content: "";
        position: absolute;
        top: 32px;
        left: calc(16.66% + 1rem);
        right: calc(16.66% + 1rem);
        height: 1px;
        background: linear-gradient(
          90deg,
          var(--accent) 0%,
          rgba(232, 93, 38, 0.3) 100%
        );
        z-index: 0;
      }

      .step {
        position: relative;
        z-index: 1;
      }

      .step-num {
        width: 64px;
        height: 64px;
        background: rgba(245, 244, 239, 0.06);
        border: 1.5px solid rgba(245, 244, 239, 0.12);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Syne", sans-serif;
        font-size: 1.3rem;
        font-weight: 800;
        color: var(--accent);
        margin-bottom: 1.5rem;
        transition:
          background 0.2s,
          border-color 0.2s;
      }

      .step:hover .step-num {
        background: rgba(232, 93, 38, 0.12);
        border-color: var(--accent);
      }

      .step h3 {
        font-size: 1.05rem;
        font-weight: 700;
        margin-bottom: 0.6rem;
        letter-spacing: -0.02em;
      }

      .step p {
        font-size: 0.88rem;
        color: rgba(245, 244, 239, 0.5);
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <div class="navbar bg-base-100 shadow-sm nav1">
      <div class="navbar-start">
        <div class="dropdown">
          <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
            <svg

            <li><a href="#reviews">Reviews</a></li>

        </div>
        <a class="btn btn-ghost text-xl">Routly</a>
      </div>
      <div class="navbar-center hidden lg:flex">
        <ul class="menu menu-horizontal px-1">
          <li><a href="./ride_booking.php">Book a ride</a></li>
          <li><a href="#how">How it works</a></li>

        </ul>

      <div class="navbar-end">
        <a class="btn" href="#cta">Get Started</a>
      </div>
    </div>

    <!-- ─── Scroll reveal ─── -->
    <script>
      const observer = new IntersectionObserver(
        (entries) =>
          entries.forEach((e) => {
            if (e.isIntersecting) e.target.classList.add("visible");
          }),
        { threshold: 0.12 },
      );
      document
        .querySelectorAll(".reveal")
        .forEach((el) => observer.observe(el));
    </script>
  </body>
</html>
